<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About H 貓咪咖啡廳</title>
    <style>
        /* 注入新色票變數 */
        :root {
            --primary-blue: #5687A8;    /* 品牌藍 */
            --warm-wood: #A68966;      /* 暖木色 */
            --dark-grey: #333333;      /* 深色文字 */
            --bg-light: #F9F9F9;       /* 背景淺灰 */
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--dark-grey);
            text-align: center;
        }

        /* 新增 Logo 與 Header 區塊 */
        header {
            background-color: #fff;
            padding: 40px 20px;
            border-bottom: 4px solid var(--primary-blue);
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            color: var(--primary-blue);
            margin: 10px 0;
        }

        /* 保留你原本的內容區塊結構 */
        .content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h2 {
            color: var(--warm-wood);
            border-bottom: 2px solid var(--warm-wood);
            padding-bottom: 10px;
            display: inline-block;
        }

        .cat-info {
            margin-bottom: 40px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 確保照片正常顯示並維持比例 */
        img.cat-photo {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 15px;
        }

        footer {
            padding: 20px;
            background-color: var(--dark-grey);
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="About H Coffee Logo" class="logo">
        <h1>About H Coffee</h1>
    </header>

    <div class="content">
        <div class="cat-info">
            <h2>貓咪介紹</h2>
            <p>這裡保留你原本寫的貓咪成員介紹文字...</p>
            <img src="cat1.jpg" alt="貓咪照片" class="cat-photo">
        </div>

        <div class="cat-info">
            <h2>入店須知</h2>
            <p>這裡保留你原本寫的須知內容...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 About H Coffee. All rights reserved.</p>
    </footer>

</body>
</html>
