<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用餐守則 | About H 貓咪咖啡廳</title>
    <style>
        :root {
            --primary-blue: #5687A8;
            --warm-wood: #A68966;
            --dark-grey: #333333;
            --bg-light: #F9F9F9;
        }

        body {
            font-family: sans-serif;
            line-height: 1.8;
            background-color: var(--bg-light);
            color: var(--dark-grey);
            margin: 0;
            padding: 20px;
        }

        .content-box {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--warm-wood);
        }

        h2 {
            color: var(--warm-wood);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 15px;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--primary-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="content-box">
        <h2>About H 貓咪咖啡廳用餐守則</h2>
        <ul>
            <li>每人最低消費為一杯飲品。</li>
            <li>用餐時間限制為 90 分鐘。</li>
            <li>請勿在未經允許的情況下強行抱貓或餵食。</li>
            <li>拍照請關閉閃光燈，保護貓咪眼睛。</li>
            <li>進入貓咪互動區請先進行手部消毒。</li>
        </ul>
        <a href="index.html" class="back-btn">← 回到首頁</a>
    </div>
</body>
</html>
